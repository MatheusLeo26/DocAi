<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocAI - Conversor de Arquivos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <style>
        .converter-container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
        }
        .sidebar .logo { margin-bottom: 3rem; text-align: center; }
        .nav-item {
            padding: 1rem;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
            cursor: pointer;
            display: block;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255, 255, 255, 0.1); color: white; }
        .main-content {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .header h2 { font-size: 2rem; font-weight: 600; }
        
        .converter-box {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 600px;
            animation: fadeInUp 0.6s ease forwards;
        }
        
        .dropzone {
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
            background: rgba(0, 0, 0, 0.05);
        }
        .dropzone:hover, .dropzone.dragover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }
        .dropzone .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
        .dropzone p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .dropzone span {
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.8;
        }
        
        .file-info {
            display: none;
            background: var(--btn-sec-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            align-items: center;
            justify-content: space-between;
        }
        .file-info.show { display: flex; }
        .file-info .details {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .file-info .name {
            font-size: 0.9rem;
            font-weight: 600;
        }
        .file-info .size {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .file-info .remove-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .form-group select {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            background: var(--btn-sec-bg);
            font-size: 0.95rem;
            outline: none;
        }
        
        .convert-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }
        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4);
        }
        .convert-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 1.1rem;
            color: #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Convertendo seu arquivo...</div>
    </div>

    <div class="converter-container">
        <aside class="sidebar">
            <div class="logo">DocAI<span class="dot">.</span></div>
            <a href="/dashboard" class="nav-item">Biblioteca</a>
            <a href="/create/resume" class="nav-item">Criar Currículo</a>
            <a href="/create/contract" class="nav-item">Criar Contrato</a>
            <a href="/create/report" class="nav-item">Criar Relatório</a>
            <a href="/converter" class="nav-item active">Conversor de Arquivos</a>
            <div style="margin-top: auto;">
                <a href="#" class="nav-item" id="logoutBtn" style="color: #ef4444;">Sair</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="header">
                <h2>Conversor de Arquivos</h2>
                <button id="themeToggle" class="btn-secondary">Modo Escuro</button>
            </div>

            <div class="converter-box">
                <form id="convertForm">
                    <div class="dropzone" id="dropzone">
                        <span class="icon">📁</span>
                        <p>Arraste seu arquivo aqui ou clique para selecionar</p>
                        <span>Formatos aceitos: DOCX, PNG, JPG, JFIF, PDF</span>
                        <input type="file" id="fileInput" style="display: none;" accept=".docx,.png,.jpg,.jpeg,.jfif,.pdf">
                    </div>

                    <div class="file-info" id="fileInfo">
                        <div class="details">
                            <span class="name" id="fileName">nome_do_arquivo.png</span>
                            <span class="size" id="fileSize">1.2 MB</span>
                        </div>
                        <button type="button" class="remove-btn" id="removeFileBtn">🗑</button>
                    </div>

                    <div class="form-group" id="formatGroup" style="display: none;">
                        <label for="targetFormat">Converter para</label>
                        <select id="targetFormat">
                            <!-- Opções carregadas dinamicamente -->
                        </select>
                    </div>

                    <button type="submit" class="convert-btn" id="convertBtn" disabled>Converter e Baixar</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/login'; return; }

            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('token');
                window.location.href = '/login';
            });

            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('fileInput');
            const fileInfo = document.getElementById('fileInfo');
            const fileName = document.getElementById('fileName');
            const fileSize = document.getElementById('fileSize');
            const removeFileBtn = document.getElementById('removeFileBtn');
            const formatGroup = document.getElementById('formatGroup');
            const targetFormat = document.getElementById('targetFormat');
            const convertBtn = document.getElementById('convertBtn');
            const convertForm = document.getElementById('convertForm');
            const loadingOverlay = document.getElementById('loadingOverlay');

            let selectedFile = null;

            // Drag and drop events
            ['dragenter', 'dragover'].forEach(eventName => {
                dropzone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    dropzone.classList.add('dragover');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropzone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    dropzone.classList.remove('dragover');
                }, false);
            });

            dropzone.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                if (files.length > 0) {
                    handleFileSelect(files[0]);
                }
            });

            dropzone.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFileSelect(e.target.files[0]);
                }
            });

            removeFileBtn.addEventListener('click', () => {
                selectedFile = null;
                fileInput.value = '';
                fileInfo.classList.remove('show');
                dropzone.style.display = 'block';
                formatGroup.style.display = 'none';
                convertBtn.disabled = true;
            });

            function handleFileSelect(file) {
                selectedFile = file;
                fileName.textContent = file.name;
                fileSize.textContent = (file.size / (1024 * 1024)).toFixed(2) + ' MB';
                fileInfo.classList.add('show');
                dropzone.style.display = 'none';
                convertBtn.disabled = false;

                const ext = file.name.split('.').pop().toLowerCase();
                targetFormat.innerHTML = '';

                if (ext === 'docx') {
                    formatGroup.style.display = 'block';
                    targetFormat.innerHTML = '<option value="pdf">PDF</option>';
                } else if (ext === 'pdf') {
                    formatGroup.style.display = 'block';
                    targetFormat.innerHTML = '<option value="pdfa">PDF/A</option>';
                } else if (['png', 'jpg', 'jpeg', 'jfif'].includes(ext)) {
                    formatGroup.style.display = 'block';
                    const options = ['PNG', 'JPG', 'JFIF'].filter(f => f.toLowerCase() !== ext && !(ext === 'jpeg' && f === 'JPG'));
                    targetFormat.innerHTML = options.map(opt => `<option value="${opt.toLowerCase()}">${opt}</option>`).join('');
                } else {
                    formatGroup.style.display = 'none';
                    alert('Formato não suportado. Por favor selecione um arquivo válido.');
                    removeFileBtn.click();
                }
            }

            convertForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!selectedFile) return;

                const ext = selectedFile.name.split('.').pop().toLowerCase();
                const formData = new FormData();
                formData.append('file', selectedFile);

                let endpoint = '';
                if (ext === 'docx') {
                    endpoint = '/api/convert/document';
                } else if (ext === 'pdf') {
                    endpoint = '/api/convert/pdf';
                } else {
                    endpoint = '/api/convert/image';
                    formData.append('target_format', targetFormat.value);
                }

                loadingOverlay.classList.add('show');

                try {
                    const res = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });

                    loadingOverlay.classList.remove('show');

                    if (res.ok) {
                        const blob = await res.blob();
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        const baseName = selectedFile.name.substring(0, selectedFile.name.lastIndexOf('.'));
                        a.download = `${baseName}.${targetFormat.value}`;
                        a.click();
                    } else {
                        const err = await res.json();
                        alert(err.message || 'Erro ao converter arquivo');
                    }
                } catch (err) {
                    loadingOverlay.classList.remove('show');
                    alert('Erro na conexão: ' + err.message);
                }
            });
        });
    </script>
</body>
</html>
